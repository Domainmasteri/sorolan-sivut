<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Sorolan Salasanakone - Luo vahvoja salasanoja</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://sorola.fi/salasanat/">
    <link rel="stylesheet" type="text/css" href="/tyylit/pohja.css">
    <link rel="icon" type="image/svg+xml" href="/tyylit/favicon.svg">
    <meta name="description" content="Luo vahvoja ja turvallisia salasanoja ilmaiseksi. Valitse pituus ja merkkityypit – salasana generoidaan suoraan selaimessasi, ei palvelimella.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sorola.fi/salasanat/">
    <meta property="og:site_name" content="Sorolan Sakki">
    <meta property="og:title" content="Sorolan Salasanakone">
    <meta property="og:description" content="Luo vahvoja salasanoja selaimessasi turvallisesti.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Sorolan Salasanakone">
    <meta name="twitter:description" content="Luo vahvoja salasanoja selaimessasi turvallisesti.">
    <style>
        /* Salasanakoneen omat mukautetut asettelut uuteen teemaan sopiviksi */
        .asetus-rivi {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            user-select: none;
        }
        .asetus-rivi input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #ffaa00; /* Muuttaa ruksit teeman värisiksi */
        }
        .slider-kontti {
            margin-bottom: 25px;
            color: white;
            font-size: 1.1rem;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            accent-color: #ffaa00;
        }
        #valmis-salasana {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
            color: #ffaa00;
            background: #0b0d13;
            border: 1px solid #2d3748;
        }
    </style>
</head>
<body>
    <a href="#paaosio" class="skip-to-content">Hyppää pääsisältöön</a>

    <div class="laatikko">
        <h1 class="otsikko">Salasanakone</h1>

        <div class="osion-tausta">
            <p style="margin: 0; text-align: center;">Luo vahvoja ja turvallisia salasanoja murtovarmuuden parantamiseksi. Valitse pituus ja merkit alta.</p>
        </div>

        <main id="paaosio">
        <div class="osion-tausta">
            <h2>1. Muokkaa asetuksia</h2>
            
            <div class="slider-kontti">
                <label for="pituus-slider">Salasanan pituus: <span id="pituus-arvo" style="color: #ffaa00; font-weight: bold;">16</span> merkkiä</label>
                <input type="range" id="pituus-slider" min="6" max="32" value="16">
            </div>

            <label class="asetus-rivi">
                <input type="checkbox" id="pienet-kirjaimet" checked>
                Sisällytä pieniä kirjaimia (a-z)
            </label>
            
            <label class="asetus-rivi">
                <input type="checkbox" id="isot-kirjaimet" checked>
                Sisällytä isoja kirjaimia (A-Z)
            </label>
            
            <label class="asetus-rivi">
                <input type="checkbox" id="numerot" checked>
                Sisällytä numeroita (0-9)
            </label>
            
            <label class="asetus-rivi">
                <input type="checkbox" id="erikoismerkit" checked>
                Sisällytä erikoismerkkejä (!@#$%)
            </label>

            <button id="luo-btn" class="nappula" style="margin-top: 15px;">🎲 Arvo uusi salasana</button>
        </div>

        <div class="osion-tausta" style="text-align: center;">
            <h2>Valmis salasana</h2>
            
            <div style="margin-bottom: 20px;">
                <label for="valmis-salasana" class="sr-only">Generoitu salasana</label>
                <input type="text" id="valmis-salasana" class="syote" readonly placeholder="Paina Arvo-nappia" aria-label="Generoitu salasana">
            </div>
            
            <button id="kopioi-btn" class="nappula" style="background-color: #218838; color: white;">📋 Kopioi leikepöydälle</button>
        </div>
        </main>

        <a href="../" class="linkki-takaisin">← Takaisin pääsivulle</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
