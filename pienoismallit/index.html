<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles/style.css">

</head>
<body>

        <header>
            <h1>Pienoismallien Arkisto</h1>
            <p>Iskän pienoismallikokoelma - Digitaalinen työpaja</p>
            
            <a href="https://srla.fi/pienoismallit" class="btn fb-btn" target="_blank">Siirry Facebook-ryhmään</a>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Hae julkaisuja...">

            <nav style="margin-top: 20px;"><a href="login">Hallintapaneeli / Kirjaudu</a></nav>

        <main id="gallery">

        <hr>

            <h2>Yhteystiedot</h2>

    <script src="script.js"></script>
