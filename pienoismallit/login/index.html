<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Hallintapaneeli | Sorola Pienoismallit</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="icon" href="../styles/favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>Hallintapaneeli</h1>
            <button id="logoutBtn" style="display:none;" class="danger-btn">Kirjaudu ulos</button>
        </div>

        <div id="loginSection" class="admin-card">
            <h2>Kirjaudu sisään</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Käyttäjätunnus" required>
                <input type="password" id="password" placeholder="Salasana" required>
                <button type="submit">Kirjaudu</button>
            </form>
            <div class="form-links">
                <button type="button" onclick="toggleSection('recoverySection', 'loginSection')" class="text-link">Unohditko salasanan?</button>
                <button type="button" onclick="toggleSection('registerSection', 'loginSection')" class="text-link">Onko sinulla kutsukoodi? Rekisteröidy</button>
            </div>
        </div>

        <div id="registerSection" class="admin-card border-blue" style="display:none;">
            <h2 class="text-blue">Rekisteröidy jäseneksi</h2>
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="Valitse käyttäjätunnus" required>
                <input type="password" id="regPassword" placeholder="Valitse salasana" required>
                <input type="text" id="regInviteCode" placeholder="Kutsukoodi (esim. 8A4F12BC)" required>
                <button type="submit" class="blue-btn">Rekisteröidy</button>
                <button type="button" onclick="toggleSection('loginSection', 'registerSection')" class="secondary-btn">Peruuta</button>
            </form>
        </div>

        <div id="recoverySection" class="admin-card border-red" style="display:none;">
            <h2 class="text-red">Palauta salasana</h2>
            <p>Syötä käyttäjätunnuksesi ja talteen ottamasi palautuskoodi.</p>
            <form id="recoveryForm">
                <input type="text" id="recUsername" placeholder="Käyttäjätunnus" required>
                <input type="text" id="recCode" placeholder="Palautuskoodi (esim. A1B2-C3D4-E5F6-G7H8)" required>
                <input type="password" id="recNewPassword" placeholder="Uusi salasana" required>
                <button type="submit" class="danger-btn">Vaihda salasana</button>
                <button type="button" onclick="toggleSection('loginSection', 'recoverySection')" class="secondary-btn">Peruuta</button>
            </form>
        </div>

        <div id="dashboardSection" style="display:none;">
            
            <div class="admin-card">
                <h2>Lisää uusi julkaisu</h2>
                <form id="postForm">
                    <input type="text" id="title" placeholder="Otsikko" required>
                    <textarea id="content" placeholder="Julkaisun teksti..." rows="5" required></textarea>
                    <input type="text" id="image_url" placeholder="Kuvan URL-osoite (valinnainen)">
                    <label class="checkbox-label">
                        <input type="checkbox" id="is_private"> Tee julkaisusta yksityinen (vain kirjautuneille jäsenille)
                    </label>
                    <button type="submit">Julkaise</button>
                </form>
            </div>

            <div class="admin-card">
                <h2>Muokkaa yhteystietoja</h2>
                <form id="settingsForm">
                    <textarea id="contactInput" rows="4" required placeholder="Syötä yhteystiedot tähän..."></textarea>
                    <button type="submit">Tallenna yhteystiedot</button>
                </form>
            </div>

            <div class="admin-card border-purple">
                <h2 class="text-purple">Kutsu uusi jäsen</h2>
                <p>Luo kertakäyttöinen kutsukoodi, jonka voit antaa uudelle jäsenelle rekisteröitymistä varten.</p>
                <button id="generateInviteBtn" class="purple-btn">Luo kutsukoodi</button>
                <p id="newInviteCodeDisplay" class="code-display"></p>
            </div>
            
        </div>
    </div>
    
    <script>
        function toggleSection(showId, hideId) {
            document.getElementById(hideId).style.display = 'none';
            document.getElementById(showId).style.display = 'block';
        }
    </script>
    <script src="admin.js"></script>
</body>
</html>
