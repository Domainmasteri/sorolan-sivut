<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorola Share</title>
    
    <link rel="stylesheet" href="/tyylit/pohja.css">
    <link rel="icon" type="image/svg+xml" href="tyylit/fav.ico">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="share-container" style="max-width: 500px; margin: 40px auto; padding: 20px; font-family: sans-serif;">
        <h1>Jaa tiedostoja</h1>

        <div class="settings" style="margin-bottom: 20px; background: #f3f4f6; padding: 15px; rounded: 8px;">
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:14px; font-weight:bold; margin-bottom:5px;">Säilytysaika:</label>
                <select id="expiryDays" style="width:100%; padding:8px;">
                    <option value="1">1 päivä</option>
                    <option value="3">3 päivää</option>
                    <option value="7" selected>7 päivää (maksimi)</option>
                </select>
            </div>
            <div>
                <label style="display:block; font-size:14px; font-weight:bold; margin-bottom:5px;">Latauskertojen rajoitus (0 = rajaton):</label>
                <input type="number" id="maxDownloads" value="0" min="0" style="width:100%; padding:8px; box-sizing: border-box;" />
            </div>
        </div>

        <div id="dropzone" class="dropzone" style="border: 2px dashed #ccc; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 20px; background: #fff;">
            <input type="file" id="fileInput" style="display: none;" />
            
            <div id="dropzone-content">
                <i data-lucide="upload-cloud"></i>
                <p>Raahaa tiedosto tähän tai klikkaa ladataksesi</p>
            </div>
            
            <div id="loading" style="display: none; flex-direction: column; align-items: center;">
                <i data-lucide="loader-2" style="animation: spin 1s linear infinite;"></i>
                <p>Ladataan pilveen...</p>
            </div>
        </div>

        <div id="result" style="display: none; padding: 20px; border: 1px solid green; background: #f0fdf4;">
            <p style="color: green; font-weight: bold;">Tiedosto ladattu onnistuneesti!</p>
            <input type="text" id="shareLink" readonly style="width: 75%; padding: 8px;" />
            <button id="copyBtn" style="padding: 8px 12px; cursor:pointer;">Kopioi</button>
        </div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        lucide.createIcons();

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const dropzoneContent = document.getElementById('dropzone-content');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const shareLink = document.getElementById('shareLink');
        const copyBtn = document.getElementById('copyBtn');

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = 'blue'; });
        dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = '#ccc'; });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = '#ccc';
            if (e.dataTransfer.files.length) handleUpload(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', function() {
            if (this.files.length) handleUpload(this.files[0]);
        });

        async function handleUpload(file) {
            const MAX_SIZE_MB = 50; // Tiedostorajoitus megatavuina
            
            if (file.size > MAX_SIZE_MB * 1024 * 1024) {
                alert(`Tiedosto on liian suuri! Sallittu maksimikoko on ${MAX_SIZE_MB} MB.`);
                fileInput.value = '';
                return;
            }

            dropzoneContent.style.display = 'none';
            loading.style.display = 'flex';
            result.style.display = 'none';
            dropzone.style.pointerEvents = 'none';

            // Haetaan käyttäjän asettamat rajoitukset käyttöliittymästä
            const expiryDays = document.getElementById('expiryDays').value;
            const maxDownloads = document.getElementById('maxDownloads').value;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('expiryDays', expiryDays);
            formData.append('maxDownloads', maxDownloads);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Lataus epäonnistui.');
                
                shareLink.value = data.url;
                result.style.display = 'block';
            } catch (error) {
                alert('Virhe: ' + error.message);
            } finally {
                loading.style.display = 'none';
                dropzoneContent.style.display = 'block';
                dropzone.style.pointerEvents = 'auto';
                fileInput.value = ''; 
            }
        }

        copyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            shareLink.select();
            document.execCommand('copy');
            alert('Linkki kopioitu leikepöydälle!');
        });
    </script>
</body>
</html>
