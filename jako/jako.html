```html
<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorola Share - Jaa tiedostoja</title>
    <!-- Tailwind CSS tyylejä varten (voit korvata omilla tyyleilläsi) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide-ikonit -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Muutama custom tyyli drag & drop -efektille */
        .drag-active {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Sorola Share</h1>
            <p class="text-sm text-gray-500 mt-2">Jaa tiedostoja turvallisesti omalta palvelimelta</p>
        </div>

        <!-- Drag & Drop alue -->
        <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer transition-colors hover:bg-gray-50">
            <input type="file" id="fileInput" class="hidden" />
            <div id="dropzone-content" class="flex flex-col items-center">
                <i data-lucide="upload-cloud" class="w-12 h-12 text-gray-400 mb-4"></i>
                <p class="text-gray-600 font-medium">Raahaa tiedosto tähän</p>
                <p class="text-xs text-gray-400 mt-1">tai klikkaa valitaksesi</p>
            </div>
            
            <!-- Latausanimaatio (piilotettu oletuksena) -->
            <div id="loading" class="hidden flex-col items-center">
                <i data-lucide="loader-2" class="w-10 h-10 text-blue-500 animate-spin mb-3"></i>
                <p class="text-sm text-gray-600 font-medium">Ladataan pilveen...</p>
            </div>
        </div>

        <!-- Tulosalue (piilotettu oletuksena) -->
        <div id="result" class="hidden mt-6 bg-green-50 rounded-lg p-4 border border-green-200">
            <p class="text-sm text-green-800 font-medium mb-2">Tiedosto ladattu onnistuneesti!</p>
            <div class="flex items-center gap-2">
                <input type="text" id="shareLink" readonly class="w-full bg-white border border-green-300 rounded px-3 py-2 text-sm text-gray-700 focus:outline-none" />
                <button id="copyBtn" class="bg-green-600 hover:bg-green-700 text-white p-2 rounded transition-colors" title="Kopioi linkki">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Alustetaan ikonit
        lucide.createIcons();

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const dropzoneContent = document.getElementById('dropzone-content');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const shareLink = document.getElementById('shareLink');
        const copyBtn = document.getElementById('copyBtn');

        // Avaa tiedostonvalinta klikatessa
        dropzone.addEventListener('click', () => fileInput.click());

        // Drag & drop efektit
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('drag-active');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-active');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) {
                handleUpload(e.dataTransfer.files[0]);
            }
        });

        // Tiedoston valinta inputin kautta
        fileInput.addEventListener('change', function() {
            if (this.files.length) {
                handleUpload(this.files[0]);
            }
        });

        // Latauslogiikka
        async function handleUpload(file) {
            // UI päivitys lataustilaan
            dropzoneContent.classList.add('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            dropzone.style.pointerEvents = 'none';

            const formData = new FormData();
            formData.append('file', file);

            try {
                // Lähetetään tiedosto Cloudflare Functionille
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Lataus epäonnistui');

                const data = await response.json();
                
                // Näytetään tulos
                shareLink.value = data.url;
                result.classList.remove('hidden');
            } catch (error) {
                alert('Virhe tiedostoa ladattaessa: ' + error.message);
            } finally {
                // Palautetaan UI alkutilaan
                loading.classList.add('hidden');
                dropzoneContent.classList.remove('hidden');
                dropzone.style.pointerEvents = 'auto';
                fileInput.value = ''; // Nollataan input
            }
        }

        // Kopioi leikepöydälle
        copyBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Estää dropzonen klikkauksen
            shareLink.select();
            document.execCommand('copy');
            
            // Pieni visuaalinen palaute
            const icon = copyBtn.querySelector('i');
            icon.setAttribute('data-lucide', 'check');
            lucide.createIcons();
            setTimeout(() => {
                icon.setAttribute('data-lucide', 'copy');
                lucide.createIcons();
            }, 2000);
        });
    </script>
</body>
</html>
