<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Sorolan Linkkilyhennin - Turvallinen URL-lyhentäjä</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://sorola.fi/lyhennin/">
    <link rel="stylesheet" type="text/css" href="../tyylit/pohja.css">
    <link rel="icon" type="image/svg+xml" href="../tyylit/fav.ico">
    
    <meta name="description" content="Lyhennä pitkät URL-osoitteet nopeasti. Suomalainen ja turvallinen linkkilyhennin, joka tarjoaa helpon hallinnan ja tilastot.">
    <meta name="keywords" content="linkkilyhennin, URL lyhennin, lyhytlinkki, URL shortener, Sorola">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sorola.fi/lyhennin/">
    <meta property="og:site_name" content="Sorolan Sakki">
    <meta property="og:title" content="Sorolan Linkkilyhennin">
    <meta property="og:description" content="Tee pitkistä urleista siistejä ja helposti jaettavia.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Sorolan Linkkilyhennin">
    <meta name="twitter:description" content="Tee pitkistä urleista siistejä ja helposti jaettavia.">
</head>
<body>
    <a href="#paaosio" class="skip-to-content">Hyppää pääsisältöön</a>

    <div class="laatikko">
        <h1 class="otsikko">URL-Lyhentäjä</h1>
        
        <div class="osion-tausta">
            <p style="margin: 0; text-align: center;">Jos sinulla on jokin todella pitkä linkki, voit kopioida sen tähän, ja tehdä siitä lyhyemmän.</p>
        </div>

        <main id="paaosio">
        <div class="osion-tausta">
            <h2>Luo Lyhytlinkki</h2>
            <form id="lyhennin-lomake" class="flex-form">
                <label for="url-syote" class="sr-only">Lyhennettävä URL-osoite</label>
                <input type="url" id="url-syote" class="syote" name="url" placeholder="http(s)://" pattern="https?://.+" required aria-label="Lyhennettävä URL-osoite">
                <button type="submit" class="nappula">Lyhennä linkki</button>
            </form>

            <div id="tulos-alue" style="display: none; width: 100%; text-align: center; margin-top: 20px;">
                <p style="color: #ffaa00; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem;">Linkki on valmis!</p>
                
                <input type="text" id="lyhennetty-url" class="syote" style="text-align: center; margin-bottom: 15px;" readonly aria-label="Lyhennetty URL-osoite">
                
                <div class="flex-form">
                    <button id="kopioi-btn" class="nappula" type="button">Kopioi linkki</button>
                    <a href="../qr" class="nappula" style="background: #191f2d; color: #ffaa00; border: 1px solid #ffaa00;">QR-Koodin luojaan</a>
                </div>
            </div>
        </div>
        </main>

        <a href="../" class="linkki-takaisin">← Takaisin pääsivulle</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
