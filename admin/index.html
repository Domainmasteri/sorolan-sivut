<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Sorolan Sakki - Hallintapaneeli</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../tyylit/pohja.css">
    <link rel="icon" type="image/svg+xml" href="../tyylit/fav.ico">
    <style>
        .piilotettu { display: none !important; }
        .ilmoitus { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .virhe { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .onnistui { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #4ade80; }
        
        .lataus-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,170,0,0.3);
            border-radius: 50%;
            border-top-color: #ffaa00;
            animation: pyori 1s ease-in-out infinite;
        }
        @keyframes pyori { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="laatikko" style="max-width: 800px;">
        <h1 class="otsikko">Hallintapaneeli</h1>

        <div id="ilmoitus-laatikko" class="ilmoitus piilotettu"></div>

        <!-- 1. KIRJAUTUMISNÄKYMÄ -->
        <div id="login-section" class="admin-section">
            <h2>Kirjaudu Sisään</h2>
            <div class="flex-form">
                <input type="text" id="login-user" class="syote" placeholder="Käyttäjätunnus">
                <input type="password" id="login-pass" class="syote" placeholder="Salasana">
                <button onclick="kirjaudu()" class="nappula">Kirjaudu</button>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="vaihdaNakymaa('register-section')" class="linkki-takaisin" style="margin-top: 0;">Eikö sinulla ole tunnusta? Rekisteröidy kutsukoodilla.</a>
            </div>
        </div>

        <!-- 2. REKISTERÖINTINÄKYMÄ -->
        <div id="register-section" class="admin-section piilotettu">
            <h2>Rekisteröidy Kutsukoodilla</h2>
            <div class="flex-form">
                <input type="text" id="reg-invite" class="syote" placeholder="Kutsukoodi">
                <input type="text" id="reg-user" class="syote" placeholder="Haluttu käyttäjätunnus">
                <input type="password" id="reg-pass" class="syote" placeholder="Salasana">
                <button onclick="rekisteroidy()" class="nappula nappi-oranssi">Luo tunnus</button>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="vaihdaNakymaa('login-section')" class="linkki-takaisin" style="margin-top: 0;">Takaisin kirjautumiseen.</a>
            </div>
        </div>

        <!-- 3. HALLINTANÄKYMÄ (DASHBOARD) -->
        <div id="dashboard-section" class="piilotettu">
            <div class="admin-section">
                <h2>🔗 Uusi oma linkki</h2>
                <div class="flex-form">
                    <input type="url" id="link-original" class="syote" placeholder="Kohdeosoite (https://...)">
                    <input type="text" id="link-path" class="syote" placeholder="Lyhenne (tyhjä = satunnainen)">
                    <button onclick="luoLinkki()" id="btn-luo" class="nappula nappi-oranssi">Luo Linkki</button>
                </div>
            </div>

            <div class="admin-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0; border: none;">Aktiiviset linkit</h2>
                    <button onclick="lataaLinkit()" class="nappula nappi-pieni">Päivitä ↻</button>
                </div>
                
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Lyhytosoite</th>
                                <th>Kohdeosoite</th>
                                <th>Luotu</th>
                                <th>Toiminnot</th>
                            </tr>
                        </thead>
                        <tbody id="links-table-body">
                            <tr>
                                <td colspan="4" style="text-align: center; color: #a0aec0;">Ei linkkejä ladattu.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div style="text-align: center;">
                <button onclick="kirjauduUlos()" class="nappula nappi-pieni nappi-puna">Kirjaudu ulos</button>
            </div>
        </div>

        <a href="../" class="linkki-takaisin">← Takaisin etusivulle</a>
    </div>

    <script>
        const API_AUTH = '/api/auth';
        const API_LINKS = '/api/links';

        let sessionToken = localStorage.getItem('sorola_admin_token');

        window.onload = () => {
            if (sessionToken) {
                vaihdaNakymaa('dashboard-section');
                lataaLinkit();
            }
        };

        function naytaIlmoitus(viesti, tyyppi = 'virhe') {
            const laatikko = document.getElementById('ilmoitus-laatikko');
            laatikko.textContent = viesti;
            laatikko.className = `ilmoitus ${tyyppi}`;
            laatikko.classList.remove('piilotettu');
            setTimeout(() => { laatikko.classList.add('piilotettu'); }, 5000);
        }

        function vaihdaNakymaa(id) {
            document.getElementById('login-section').classList.add('piilotettu');
            document.getElementById('register-section').classList.add('piilotettu');
            document.getElementById('dashboard-section').classList.add('piilotettu');
            document.getElementById(id).classList.remove('piilotettu');
            document.getElementById('ilmoitus-laatikko').classList.add('piilotettu');
        }

        function haeOtsakkeet() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${sessionToken}`
            };
        }

        async function kirjaudu() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            if(!user || !pass) return naytaIlmoitus("Syötä tunnus ja salasana.");

            try {
                const res = await fetch(API_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', username: user, password: pass })
                });
                
                const data = await res.json();
                if (res.ok) {
                    sessionToken = btoa(user + ":" + pass); 
                    localStorage.setItem('sorola_admin_token', sessionToken);
                    document.getElementById('login-user').value = '';
                    document.getElementById('login-pass').value = '';
                    vaihdaNakymaa('dashboard-section');
                    lataaLinkit();
                } else {
                    naytaIlmoitus(data.error || "Virheellinen tunnus tai salasana.");
                }
            } catch (e) { naytaIlmoitus("Palvelinvirhe."); }
        }

        async function rekisteroidy() {
            const invite = document.getElementById('reg-invite').value;
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            if(!invite || !user || !pass) return naytaIlmoitus("Täytä kaikki kentät.");

            try {
                const res = await fetch(API_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', inviteCode: invite, username: user, password: pass })
                });
                const data = await res.json();
                
                if (res.ok) {
                    naytaIlmoitus("Tunnus luotu! Voit nyt kirjautua sisään.", "onnistui");
                    document.getElementById('reg-invite').value = '';
                    document.getElementById('reg-user').value = '';
                    document.getElementById('reg-pass').value = '';
                    vaihdaNakymaa('login-section');
                } else { naytaIlmoitus(data.error || "Rekisteröinti epäonnistui."); }
            } catch (e) { naytaIlmoitus("Palvelinvirhe."); }
        }

        function kirjauduUlos() {
            sessionToken = null;
            localStorage.removeItem('sorola_admin_token');
            vaihdaNakymaa('login-section');
        }

        async function lataaLinkit() {
            const tbody = document.getElementById('links-table-body');
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;"><div class="lataus-spinner"></div> Ladataan...</td></tr>`;
            
            try {
                const res = await fetch(API_LINKS, { headers: haeOtsakkeet() });
                if (res.status === 401) return kirjauduUlos();
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                if (data.links && data.links.length > 0) {
                    const nykyinenDomain = window.location.hostname;
                    tbody.innerHTML = data.links.map(link => `
                        <tr>
                            <td><code>${nykyinenDomain}/${link.short_path}</code></td>
                            <td><a href="${link.original_url}" target="_blank" style="color: #63b3ed; text-decoration: none;">${link.original_url.substring(0, 30)}${link.original_url.length > 30 ? '...' : ''}</a></td>
                            <td style="font-size: 0.8rem; color: #a0aec0;">${new Date(link.created_at).toLocaleDateString('fi-FI')}</td>
                            <td>
                                <button class="nappula nappi-pieni nappi-puna" onclick="poistaLinkki('${link.short_path}')">Poista</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #a0aec0;">Ei vielä linkkejä.</td></tr>`;
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ef4444;">Virhe ladattaessa linkkejä.</td></tr>`;
                naytaIlmoitus(e.message);
            }
        }

        async function luoLinkki() {
            const orgUrl = document.getElementById('link-original').value;
            const path = document.getElementById('link-path').value;
            if(!orgUrl) return naytaIlmoitus("Kohdeosoite on pakollinen.");

            const btn = document.getElementById('btn-luo');
            btn.disabled = true; btn.textContent = "Luodaan...";

            try {
                const res = await fetch(API_LINKS, {
                    method: 'POST',
                    headers: haeOtsakkeet(),
                    body: JSON.stringify({ originalURL: orgUrl, path: path })
                });
                
                const data = await res.json();
                if (res.ok) {
                    naytaIlmoitus(`Linkki luotu! (/${data.path})`, "onnistui");
                    document.getElementById('link-original').value = '';
                    document.getElementById('link-path').value = '';
                    lataaLinkit();
                } else { naytaIlmoitus(data.error || "Virhe linkkiä luotaessa."); }
            } catch (e) { naytaIlmoitus("Palvelinvirhe."); } 
            finally { btn.disabled = false; btn.textContent = "Luo Linkki"; }
        }

        async function poistaLinkki(path) {
            if(!confirm(`Haluatko varmasti poistaa linkin /${path}?`)) return;

            try {
                const res = await fetch(`${API_LINKS}?path=${encodeURIComponent(path)}`, {
                    method: 'DELETE',
                    headers: haeOtsakkeet()
                });
                
                if (res.ok) {
                    naytaIlmoitus("Linkki poistettu.", "onnistui");
                    lataaLinkit();
                } else {
                    const data = await res.json();
                    naytaIlmoitus(data.error || "Virhe poistossa.");
                }
            } catch (e) { naytaIlmoitus("Palvelinvirhe."); }
        }
    </script>
</body>
</html>
