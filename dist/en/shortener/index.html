<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorola Link Shortener - Secure URL shortener</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://sorola.fi/en/shortener/">
    <link rel="alternate" hreflang="fi" href="https://sorola.fi/lyhennin/">
    <link rel="alternate" hreflang="en" href="https://sorola.fi/en/shortener/">
    <link rel="alternate" hreflang="x-default" href="https://sorola.fi/lyhennin/">
    <link rel="stylesheet" type="text/css" href="/tyylit/pohja.css">
    <link rel="icon" type="image/svg+xml" href="/tyylit/favicon.svg">
    
    <meta name="description" content="Shorten long URLs quickly. A secure Finnish link shortener with simple management and statistics.">
    <meta name="keywords" content="link shortener, URL shortener, short link, secure short link, Sorola">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sorola.fi/en/shortener/">
    <meta property="og:site_name" content="Sorolan Sakki">
    <meta property="og:title" content="Sorola Link Shortener">
    <meta property="og:description" content="Turn long URLs into neat and easy-to-share links.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Sorola Link Shortener">
    <meta name="twitter:description" content="Turn long URLs into neat and easy-to-share links.">

    <style>
        .language-overlay { position: fixed; top: 16px; left: 16px; z-index: 10001; display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 999px; border: 1px solid rgba(255, 170, 0, 0.35); background: rgba(11, 13, 19, 0.92); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35); backdrop-filter: blur(8px); }
        .language-overlay__label { color: #cbd5e1; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
        .language-overlay__link { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; padding: 8px 12px; border-radius: 999px; border: 1px solid #334155; color: #f8fafc; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: all 0.2s ease; }
        .language-overlay__link:hover, .language-overlay__link:focus-visible { border-color: #ffaa00; color: #ffaa00; outline: none; }
        .language-overlay__link.is-active { background: #ffaa00; color: #111827; border-color: #ffaa00; }
        @media (max-width: 768px) { .language-overlay { top: auto; bottom: 12px; left: 12px; right: 12px; justify-content: center; } }
    </style>
</head>
<body>
    <nav class="language-overlay" aria-label="Language">
        <span class="language-overlay__label">Language</span>
        <a class="language-overlay__link" href="/lyhennin/">🇫🇮</a>
        <a class="language-overlay__link is-active" href="/en/shortener/" aria-current="page">🇬🇧</a>
    </nav>
    <a href="#paaosio" class="skip-to-content">Skip to content</a>

    <div class="laatikko">
        <h1 class="otsikko">URL Shortener</h1>
        
        <div class="osion-tausta">
            <p style="margin: 0; text-align: center;">If you have a really long link, you can paste it here and turn it into a shorter one.</p>
        </div>

        <main id="paaosio">
        <div class="osion-tausta">
            <h2>Create a short link</h2>
            <form id="lyhennin-lomake" class="flex-form">
                <label for="domain-syote" class="sr-only">Lyhytlinkin domain</label>
                <select id="domain-syote" class="syote" name="domain" style="flex: 0.35; min-width: 120px;" aria-label="Lyhytlinkin domain">
                    <option value="srla.fi">srla.fi</option>
                    <option value="srl.la">srl.la</option>
                </select>
                <label for="url-syote" class="sr-only">URL to shorten</label>
                <input type="url" id="url-syote" class="syote" name="url" placeholder="http(s)://" pattern="https?://.+" required aria-label="URL to shorten">
                <button type="submit" class="nappula">Shorten link</button>
            </form>

            <div id="tulos-alue" style="display: none; width: 100%; text-align: center; margin-top: 20px;">
                <p style="color: #ffaa00; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem;">Your link is ready!</p>
                
                <input type="text" id="lyhennetty-url" class="syote" style="text-align: center; margin-bottom: 15px;" readonly aria-label="Shortened URL">
                
                <div class="flex-form">
                    <button id="kopioi-btn" class="nappula" type="button">Copy link</button>
                    <a href="/en/qr" class="nappula" style="background: #191f2d; color: #ffaa00; border: 1px solid #ffaa00;">Open the QR code generator</a>
                </div>
            </div>
        </div>
        </main>

        <a href="/en/" class="linkki-takaisin">← Back to home</a>
    </div>

    <script src="/en/shortener/script.js"></script>
</body>
</html>
